    SUCCESS: The knight asks to stay at your estate a while and reminisce.

    If you accept his offer, Love (Family) and Hospitality +2 Geniality. You must pay £3/year for 1d6 years to support the knight while he stays with you.

    If you decline, gain the Prudent trait.
"110":
  name: Oops!
  full: |
