    SUCCESS: A passable performance. Gain Singing trait.
    CRITICAL SUCCESS: The ladies clap merrily. +1 Geniality. Gain Singing trait.
    FUMBLE: You sing so badly the dogs howl. -2 Geniality.
"128":
  name: A Faux Pas
  full: |
    You notice a guest about to take a seat above their station.

    MERCIFUL WINS: You point out the error before it occurs. +2 Geniality. Gain Merciful trait.
    CRUEL WINS: You laugh with others at the other guest's expense. +1 Geniality. Gain Cruel trait.
"129":
  name: Something Shiny
  full: |
    You find an expensive piece of jewelry.

    HONEST WINS: You announce your find and ensure the proper owner is found. +2 Geniality.
    DECEITFUL WINS: You may keep the trinket (worth £1). If you return it anyway, gain Honest trait.
"130":
  name: Stewardship
  full: |
    Some knights are talking about the management of their estates.

    STEWARDSHIP WINS: You impress the others with your knowledge. Gain Stewardship trait.
    ORATE WINS: You boast about your estate and how it makes you a rich man. Gain Proud trait (if you are indeed Rich), or Deceitful trait (if Ordinary or worse).
"131":
  name: Story Request
  full: |
    A lady requests you tell a story of your daring skills.

    SUCCESS: The lady enjoys your tale. +2 Geniality.
    CRITICAL SUCCESS: Enrapt, she touches your cheek. +3 Geniality.
    FAILURE: She doesn't credit your claims. -2 Geniality.
    FUMBLE: You make a fool of yourself. She laughs and tells her friends. -5 Geniality.
"132":
