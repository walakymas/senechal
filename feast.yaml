    CRITICAL SUCCESS: The knight backs down and apologizes profusely. +2 Geniality.
    FAILURE: The knight feels he is in the right and accepts your challenge. You are challenged to a duel. -1 Geniality.
    FUMBLE: The knight laughs in your face. -3 Geniality.
"72":
