"1":
  name: Merrily Did He Run
  geniality: 0
  check:
    passion: modest
    win:
      check:
        skill: compose
        success:
          geniality: 2
    oppose:
      check:
        skill: Courtesy
        fail:
          geniality: -2
  text: "An entertainer mocks one of your Distinguishing Features in his song"
  full: |
    An entertainer mocks one of your Distinguishing Features in his song.

    MODEST WINS: You are gracious and laugh along. Roll Compose: on a success, you return a witty barb (+2 Geniality).

    PROUD WINS: You are visibly perturbed. Roll Courtesy: on a failure, you lose your temper (-2 Geniality).
"2":
  name: A Chance Encounter
  geniality: 1
  check:
    passion: chaste
    win:
      geniality: 3
    oppose:
      winter: Childbirth
      feast: leave
      fail:
        geniality: -3
  tags:
    - "leave"
    - "winter"
  text: "A beautiful lady passes by and whispers in your ear."
  full: |
    A beautiful lady passes by and whispers in your ear.

    CHASTE WINS: +3 Geniality.

    LUSTFUL WINS: You depart the feast arm in arm. Roll on Childbirth this Winter Phase.
"3":
  name: A Game of Dice
  geniality: 0
  check:
    skill: gaming
    success:
      action: money
      add: checkResult
    critical:
      action: money
      add: checkResult
      multiply: 2
    failure:
      action: money
      add: checkFailedBy
      multiply: -1
    fumble:
      action: money
      add: checkFailedBy
      multiply: -2
  text: "A group of guests leave the main hall to play a game of dice. They ask you to join them."
  full: |
    A group of guests leave the main hall to play a game of dice. They ask you to join them.

    SUCCESS: You gain a number of denarii equal to your Gaming result.
    CRITICAL SUCCESS: You gain a number of denarii equal to twice your Gaming result.
    FAILURE: You lose a number of denarii equal to your Gaming result minus your Gaming skill.
    FUMBLE: You lose a number of denarii equal to your Gaming result minus your Gaming skill, doubled.
"4":
  name: A Helping Hand
  geniality: 0
  check:
    passion: generous
    win:
      geniality: 2
      glory: 2
    oppose:
      text: "You decline"
  tags:
    - "miss"
  text: "A serving girl asks for assistance in taking care of a drunken knight."
  full: |
    A serving girl asks for assistance in taking care of a drunken knight.

    GENEROUS WINS: Miss the next feast round. The knight remembers your kindness when he wakes. Gain 5 Glory and +2 Geniality.

    SELFISH WINS: You decline. The knight embarrasses himself and drunkenly blames the serving girl.
"5":
  name: A Lady and You
  geniality: 1
  keep:
    geniality: 1
    draw: no
    finish: readCard
  tags:
    - "keep"
    - "host"
  text: "An important lady spends time conversing with you."
  full: |
    An important lady spends time conversing with you.

    You interact with a lady. At the start of each round you may keep this card or discard it. If you keep it, gain +1 Geniality per round.

    You cannot draw cards while you keep this card.

    If you have this card at the end of the feast, you may petition the host for permission to court the lady.
