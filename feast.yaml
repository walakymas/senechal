  text: "A serving girl flirts with you."
  full: |
    A serving girl flirts with you.

    SUCCESS: +1 Geniality. Gain Flirting.

    CRITICAL SUCCESS: Roll Chaste vs Lustful. If Lustful wins, you depart the feast with the girl; roll on Childbirth this Winter Phase.

    FUMBLE: You receive a slap in the face.
