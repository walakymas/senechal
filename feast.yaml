    SUCCESS: How noble you are! +1 Geniality.
    CRITICAL SUCCESS: The servants hear you. The next morning, you will find a bottle of the house's best wine among your equipment. +2 Geniality.
    FUMBLE: Word spreads among the commoners of your ill-considered ways. Lose £1 of income this Winter Phase as they conceal render from you.
"117":
  name: Personal Valet
  full: |
