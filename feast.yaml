    Keep this card. You miss the next round of the feast as you listen to gossip.

    In a subsequent round you may discard this card to avoid the Geniality penalty imposed by another card or to gain +5 to any Intrigue roll.
"75":
  name: Keep Dancing
  tags:
    - "keep"
  full: |
    You are invited to dance.

    SUCCESS: Your dancing attracts the gaze of an eligible lady. Gain Flirting trait.
    CRITICAL SUCCESS: Your dancing is admired and commented upon by many. +1 Geniality.
    FAILURE: You may keep this card until the next round and play it again instead of drawing a card. If you do not, -2 Geniality.
"76":
