  tags:
    - "keep"
  full: |
    You overhear some interesting conversation.

    SUCCESS: Keep this card. You cannot draw cards while you keep this one. Gain +10 on any one Skill roll, then discard this card.
    FUMBLE: You have misheard something and repeated it as truth. Discard this card immediately and lose 2 Geniality.
"62":
  name: Great Deeds
  full: |
    Several knights ask you to tell of your great deeds.

    MODEST WINS: Your humility pleases the knights. Gain 5 Glory.
    PROUD WINS: Roll Orate.
