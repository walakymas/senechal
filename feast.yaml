"10":
  name: A Lady of the Night
  tags:
    - "leave"
  text: "A courtesan offers her company."
  full: |
    A courtesan offers her company.

    CHASTE WINS: You gracefully decline. +1 Geniality.

    LUSTFUL WINS: Pay 3d20 denarii and depart the feast. Roll on Childbirth this Winter Phase.
"11":
  name: A Lady's Honor
  text: "A lady needs a knight to challenge another knight to a contest of honor."
  full: |
    A lady needs a knight to challenge another knight to a contest of honor.

    To determine the rival's Skill value if unknown, roll 2d6 + 8.

    YOU WIN: She compliments your skill. +2 Geniality.

    HE WINS: The lady appreciates your effort, but others are not so sure of you. -1 Geniality.

    TIE: The ladies laugh and leave, chatting. +1 Geniality.
"12":
  name: A Lady's Gift
  tags:
    - "duel"
  text: "Several knights speak about gifts to their ladies."
  full: |
    Several knights speak about gifts to their ladies.

    SUCCESS: You wax poetic about fair ladies. +2 Geniality.

    CRITICAL SUCCESS: A nearby merchant hears you and offers you a gift for half price.

    FUMBLE: “No one treats a lady like that!” A knight challenges you to a duel. -3 Geniality.
"13":
  name: A Loan?
  text: "Another knight asks if you can lend him money."
  full: |
    Another knight asks if you can lend him money to (roll 1d6): 1-2 Pay a debt; 3-4 Buy a lady a present; 5-6 Ransom a captive.

    GIVE HIM THE MONEY: Gain Generous, Merciful, or Just (respectively).

    DECLINE HIS REQUEST: Gain Selfish, Cruel, or Arbitrary (respectively).
"14":
  name: A love Poem
  text: "A knight is struggling to compose a love poem. You help him."
  full: |
    A knight is struggling to compose a love poem. You help him.

    SUCCESS: He returns the favor. You gain +5 on any one Orate roll during this feast. +1 Geniality.

    FUMBLE: The poem is terrible and embarrasses the knight; he blames you. -2 Geniality.
"15":
  name: A Man for All Seasons
  tags:
    - "keep"
  text: "You impress the other guests with your consummate knowledge."
  full: |
    You impress the other guests with your consummate knowledge.

    Keep this card. Whenever you roll a critical success or you check a Skill or Trait, place a Knowledge counter on this card.

    When you depart the feast, gain +2 Geniality for each Knowledge counter on A Man for All Seasons.
"16":
  name: A New Teacher
  tags:
    - "keep"
  text: "You meet a knight renowned in a particular field. He is willing to give you pointers."
  full: |
    You meet a knight renowned in a particular field. He is willing to give you pointers.

    SUCCESS: Gain the appropriate Skill.

    CRITICAL SUCCESS: He is impressed with your talent and sings your praises. +3 Geniality.

    FAILURE: You need to learn more. You may depart the feast for impromptu training. If you do, gain the Skill.
"17":
  name: A Roaring Fire
  tags:
    - "miss"
  text: "As you rest near the hearth, a hot ember pops from the fire and lands on your clothes."
  full: |
    As you rest near the hearth, a hot ember pops from the fire and lands on your clothes.

    SUCCESS: You knock the ember away before it can do any harm.

    FAILURE: The ember burns a large hole in your clothes. Choose: lose 2 Geniality, or miss one round to change your clothes.
