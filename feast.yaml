    CRITICAL SUCCESS: The lady sings your praises. +2 Geniality.
    FAILURE: The knight shoves you aside. You may challenge him to a duel; if you do, gain the Proud trait.
    FUMBLE: The knight challenges you to a duel for your trouble.
