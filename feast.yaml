    MODEST WINS: You ignore the scoundrel. +2 Geniality. Gain Modest trait.
    PROUD WINS: You scuffle with the knight and the steward has to pull you apart. -2 Geniality. You may challenge the knight to a duel. If you don't, lose 1 Honor.
"84":
