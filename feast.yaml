"23":
  name: A Test of Strength
  text: "A knight boasts about his strength and challenges you to an arm-wrestling match."
  full: |
    A knight boasts about his strength and challenges you to an arm-wrestling match.

    To determine the rival's Str if unknown, roll 1d6 + 12. On a tie, reroll until someone wins.

    YOU WIN: You are victorious. Gain 2 Glory (plus 1 Glory for each reroll).

    HE WINS: He moves on to challenge others. You may give this card to another player. If you do, gain 1 Geniality. That player must play this card next turn instead of drawing any cards.
"24":
  name: A Test of Strength
  text: "A knight boasts about his strength and challenges you to an arm-wrestling match."
  full: |
    A knight boasts about his strength and challenges you to an arm-wrestling match.

    To determine the rival's Str if unknown, roll 1d6 + 12. On a tie, reroll until someone wins.

    YOU WIN: You are victorious. Gain 2 Glory (plus 1 Glory for each reroll).

    HE WINS: He moves on to challenge others. You may give this card to another player. If you do, gain 1 Geniality. That player must play this card next turn instead of drawing any cards.
"25":
  name: A Slip of Wine
  text: "You share a goblet of wine with a lady. You may make a toast to her."
  full: |
    You share a goblet of wine with a lady. You may make a toast to her.

    You may choose not to toast the lady. If you do not, lose 2 Geniality and gain the Modest trait.

    If you toast her, roll Orate.
    SUCCESS: She blushes at such sentiment. +1 Geniality.
    CRITICAL SUCCESS: She is greatly impressed. +2 Geniality.
    FUMBLE: You compared her to what?!? -5 Geniality.
"26":
  name: About Things Real
  text: "A lady asks if you believe in faeries and spirits."
  full: |
    A lady asks if you believe in faeries and spirits.

    SPIRITUAL WINS: You tell her your own stories about faeries. Roll Faerie Lore: on a success, +1 Geniality.

    WORLDLY WINS: You explain that there are no faeries and that magic is not real. She walks away and calls you a curmudgeon. -1 Geniality.
"27":
  name: All You Can Eat
  tags:
    - "leave"
    - "winter"
  text: "A voracious knight challenges you to see who can eat the most."
  full: |
    A voracious knight challenges you to see who can eat the most.

    To determine the opponent's Indulgent if unknown, roll 1d6 + 13.

    IF YOU FAIL AND THE KNIGHT WINS: You depart the feast with a bellyache.

    IF THE KNIGHT FAILS AND YOU WIN: Gain 5 Glory. If you surpass a multiple of 1,000 Glory in the next Winter Phase, you may increase your size by 1.
"28":
  name: Alms
  text: "A monk is asking guests to donate to the church."
  full: |
    A monk is asking guests to donate to the church.

    SUCCESS: You must give at least 3 to the church. For each 3 donated, gain 5 Glory. If you give at least 34, gain the Generous trait.

    Pagan knights may choose not to roll, but those who willingly give at least 34 gain the Worldly trait.
"29":
  name: An Ideal Wife
  tags:
    - "host"
  text: "The host (or your lord, if present) introduces you to an eligible lady he thinks would make an ideal wife."
  full: |
    The host (or your lord, if present) introduces you to an eligible lady he thinks would make an ideal wife.

    Roll on the Random Marriage table at +5 to determine the eligible lady.

    UNMARRIED: If you decline her hand, lose 1 Loyalty (Lord).

    MARRIED: You may recommend a fellow player-knight. If you do, give this card to that player and gain the Generous trait. That player must play this card next turn instead of drawing any cards.
"30":
  name: An Ideal Wife
  tags:
    - "host"
  full: |
    The host (or your lord, if present) introduces you to an eligible lady he thinks would make an ideal wife.

    Roll on the Random Marriage table at +5 to determine the eligible lady.

    UNMARRIED: If you decline her hand, lose 1 Loyalty (Lord).

    MARRIED: You may recommend a fellow player-knight. If you do, give this card to that player and gain the Generous trait. That player must play this card next turn instead of drawing any cards.
"31":
  name: Be Valorous
  full: |
    Several knights speak about bravery versus foolish recklessness.

    VALOROUS WINS: The knights are impressed by your courageous words. +1 Geniality.

    RECKLESS WINS: They hope your recklessness will not kill you. -2 Geniality.
"32":
  name: Biggest Mistake
  tags:
    - "duel"
  full: |
    Several knights talk merrily about their greatest gaffes. They ask you to share your biggest mistake.

    SUCCESS: Your humorous anecdote is well received. Gain 5 Glory and the Modest trait.

    FAILURE: They mock you. Roll Proud: on a success, you may challenge one of them to a duel.
"33":
  name: Boasting Knights
  full: |
    Several knights are arguing about their favorite weapons and skills.

    To determine each knight's Orate if unknown, roll 2d6 + 3.

    Gain +1 Geniality for each knight you best, plus an additional +1 Geniality if you best them all.
"34":
  name: Cristian Virtue
  tags:
    - "keep"
    - "religious"
  full: |
    A monk wishes to show his worth. He hopes you will hire him after the feast as part of your retinue.

    Keep this card. While you do, gain +5 to all Read, Folk Lore, and Religion rolls. You gain +1 Geniality for each success on Read, Folk Lore, and Religion.

    If you roll a success on Indulgent, Lustful, or Worldly, the monk leaves your company and you must discard this card.
"35":
  name: Pagan Promise
  tags:
    - "keep"
    - "pagan"
  full: |
    A pagan priest wishes to show his worth. He hopes you will hire him afterwards as part of your retinue.

    Keep this card. While you do, gain +5 to all Read, Folk Lore, and Religion rolls. You gain +1 Geniality for each success on Read, Folk Lore, and Religion.

    If you roll a success on Chaste, Lazy, or Selfish, the priest leaves your company and you must discard this card.
"36":
  name: Center Stage
  full: |
    The host calls upon you to entertain with story, music, or a song.

    SUCCESS: A notable performance. +1 Geniality.
    CRITICAL SUCCESS: All are impressed. +2 Geniality.
    FUMBLE: Why did you pick that song? -2 Geniality.
"37":
  name: Chance Encounter
  tags:
    - "keep"
  full: |
    A lady asks for your help.

    SUCCESS: You offer the lady sage advice on her problem and she remains at your side. Gain the appropriate Trait, Passion, or Skill.

    Keep this card. As long as you keep it, gain +1 Geniality per round.

    Discard this card if you interact with another lady.
"38":
  name: Chivalrous Life
  full: |
    The conversation turns to matters of chivalry.

    SUCCESS: You have some good ideas. +1 Geniality.
    CRITICAL SUCCESS: You show wisdom and impress others. +2 Geniality.
    FUMBLE: An embarrassing faux pas. -2 Geniality.
"39":
  name: Christian Blessing
  tags:
    - "religious"
    - "winter"
  full: |
    You receive a blessing from a holy man present at the feast.

    Gain an additional 3 from an exceptional harvest next Winter Phase.
"40":
  name: Christian Sin
  tags:
    - "religious"
  full: |
    A renowned holy person speaks of the sins surrounding feasting.

    SPIRITUAL WINS: You gain a +5 bonus to Temperate rolls during the feast. Further, you may pledge 3 to the church. If you do, gain +2 Geniality.

    WORLDLY WINS: “I do what I want!” (no bonus)
"41":
  name: Awkward Conversation
  full: |
    Another guest engages you on a topic you know little about.

    SUCCESS: You pick up a few basics. Gain the appropriate Skill.
    CRITICAL SUCCESS: You surprise the knight with your eagerness to learn. You gain a friend for the rest of the feast: +3 to this Skill for the remainder of the feast and +2 Geniality.
"42":
  name: Damaged Goods
  full: |
    A piece of jewelry snags on a hanging or a passing cloak and is in danger of getting lost.

    SUCCESS: You manage to hold onto it, but the piece is damaged (half its value until repaired). Repairing the jewelry costs one-tenth the value of the item.

    FAILURE: Your jewelry flies off and is lost in the crowd. You can roll Awareness each following feast round; on a success, you find it again. If you roll Awareness, you draw no cards that round.

    Discard and draw again if you have no jewelry.
"43":
  name: Dangerous Game
  full: |
    Several young knights play a rather dangerous game with knives. They ask you to join in.

    SUCCESS: +1 Geniality. Gain Dagger skill.
    FAILURE: You wound your hand. Take 1d3 damage.
"44":
  name: Difficult Question
  tags:
    - "keep"
  full: |
    Keep this card until you interact with another woman. You cannot draw cards while you keep this one. Each round, make one Flirting or Romance roll.

    FLIRTING SUCCESS: The lady remains at your side, amused by your banter. +1 Geniality.
    ROMANCE SUCCESS: The lady grows fond of your comments. +2 Geniality.

    ANY FUMBLE: You must discard this card, and you lose all Geniality gained from it.

    At the end of the feast, if you still have this card, you may petition the lady's lord for permission.
"45":
  name: Angry Dogs
  tags:
    - "leave"
  full: |
    The host's dogs bark whenever you come near.

    SUCCESS: You stop eating that blood pudding. No effect.
    CRITICAL SUCCESS: You learn something new about dogs. Gain Hunting skill.
    FAILURE: You try to shoo the dogs away while still eating your food. -2 Geniality. Roll Temperate: on a success, gain Temperate trait.
    FUMBLE: The dogs chase you out of the hall! You depart the feast.
"46":
  name: Raucous Contest
  tags:
    - "leave"
  full: |
    Several knights begin a drinking contest.

    To determine each knight's Indulgent if unknown, roll 3d6 + 2.

    Gain +2 Glory for each knight you best and an additional +5 Glory if you win the contest.

    All contestants (including the player-knight) are then requested by the steward to depart the feast.
"47":
  name: Drunken Lout
  full: |
    A drunk knight, dancing clumsily, bumps into you.

    FORGIVING WINS: You gracefully help the drunk, who becomes your friend for the rest of the evening. +1 Geniality.
    VENGEFUL WINS: You bump the lout back and he is knocked to the floor. -1 Geniality.
"48":
  name: Drunken Lout
  full: |
    A drunk knight, dancing clumsily, bumps into you.

    FORGIVING WINS: You gracefully help the drunk, who becomes your friend for the rest of the evening. +1 Geniality.
    VENGEFUL WINS: You bump the lout back and he is knocked to the floor. -1 Geniality.
"49":
  name: Emergency
  tags:
    - "leave"
  full: |
    A guest sitting next to you begins choking on a piece of food.

    SUCCESS: People notice your efforts. Gain 5 Glory and +2 Geniality.
    CRITICAL SUCCESS: You gain a small favor from the thankful guest.
    FAILURE: Another knight assists with the choke and gets all the credit! -1 Geniality.
    FUMBLE: A series of clumsy efforts might have actually killed the victim, had not another guest intervened. -5 Geniality, and you depart the feast in shame.
"50":
  name: Excellent Wine
  full: |
    A very good wine is served at your table.

    TEMPERATE WINS: Gain the Temperate trait.
    INDULGENT WINS: Your Intoxication level goes up by one.
"51":
  name: Faerie Tales
  full: |
    Several ladies ask you to tell them something about faeries.

    SUCCESS: You tell some entertaining stories and the ladies smile. +1 Geniality.
    CRITICAL SUCCESS: The ladies laud you as an authority. +2 Geniality. Gain Flirting.
"52":
  name: Faerie Tales
  full: |
    Several ladies ask you to tell them something about faeries.

    SUCCESS: You tell some entertaining stories and the ladies smile. +1 Geniality.
    CRITICAL SUCCESS: The ladies laud you as an authority. +2 Geniality. Gain Flirting.
"53":
  name: Fashion Disaster
  tags:
    - "miss"
  full: |
    Another knight has arrived wearing the same clothing as you.

    SUCCESS: Your status is higher. +1 Geniality. If you decide to change clothes anyway, gain Merciful and miss the next feast round.
    FAILURE: His status is higher. You must miss one round to change clothing, or suffer -2 Geniality per round until you do.
"54":
  name: Generous Host
  tags:
    - "host"
  full: |
    The host requests your help for one of his other guests.

    Move up one seating area and remain there for the rest of the feast.
"55":
  name: Generous Knight
  full: |
    A rich and generous knight asks you about your circumstances at home.

    If your grade of maintenance is Poor or Ordinary, the knight offers to provide goods and services for you. If you accept, you may live as a Rich knight for the next year. If you decline the offer, gain the Proud trait.
"56":
  name: Gentle Woman
  tags:
    - "keep"
  full: |
    A lady takes a shine to you and helps spruce up some of your clothing.

    At the start of each round, you can keep this card or discard it. If you keep it, gain +2 Geniality per round.

    You cannot draw cards while you keep this one.

    Discard this card if you are forced to change your clothing.
"57":
  name: Glory Hound
  full: |
    Why do your friends get all the good opportunities? Not this time.

    If you drew more than one card, you must discard all other cards you drew. (You can keep other Keeper cards you already have in play.)

    You may look at each other player's cards before any cards are played this round. Choose one card from among theirs. You may play that card as if you had drawn it yourself. If you do, lose 1 Geniality and gain the Reckless trait.
"58":
  name: God(s) Shine On You
  tags:
    - "keep"
  full: |
    The power(s) above shine upon you, and everyone sees you in a different light.

    Keep this card. While you do, gain +5 to all Courtesy, Dancing, Flirting, and Orate rolls. You get +1 Geniality for each success on Courtesy, Dancing, Flirting, and Orate.

    Roll Spiritual each time you use this card's bonus. FAILURE: Discard this card.

    You cannot draw cards while you keep this one.
"59":
  name: Gossip
  tags:
    - "keep"
  full: |
    You overhear some interesting conversation.

    SUCCESS: Keep this card. You cannot draw cards while you keep this one. Gain +10 on any one Skill roll, then discard this card.
    FUMBLE: You have misheard something and repeated it as truth. Discard this card immediately and lose 2 Geniality.
"60":
  name: Gossip
  tags:
    - "keep"
  full: |
    You overhear some interesting conversation.

    SUCCESS: Keep this card. You cannot draw cards while you keep this one. Gain +10 on any one Skill roll, then discard this card.
    FUMBLE: You have misheard something and repeated it as truth. Discard this card immediately and lose 2 Geniality.
