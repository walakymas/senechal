"7":
  name: A Lady Departs
  geniality: 2
  check:
    skill: courtesy
    success:
      glory: 1
      action: check
    critical:
      opposed: 
        passion: lustful
        versus:
          passion: chaste
          unknown: 3d6+3
        win:
          winter: Childbirth
          feast: leave
  mandatory: lustful
  tags:
    - leave
    - winter
  text: "A lady is preparing to leave the feast and you may escort her to her chambers."
  full: |
    A lady is preparing to leave the feast and you may escort her to her chambers.

    SUCCESS: The lady thanks you for your kindness. Gain 1 Glory.

    CRITICAL SUCCESS: Roll Lustful vs Chaste (3d6 + 3 if unknown). On a success, you depart with her; roll on Childbirth this Winter Phase.

    Mandatory (Lustful 16+)
