    Gain 10 Glory and +3 Geniality.

    Keep this card. For the rest of the feast you must choose to draw cards in preference to any other activity. If you have any other keeper cards in play that prevent you from drawing cards, discard those keeper cards.

    While you have King of the Bean, you cannot play another keeper card.
