    CRITICAL SUCCESS: Everyone at the table is impressed. +2 Geniality.
    FAILURE: You and the host agree to disagree. -1 Geniality.
    FUMBLE: He vehemently disagrees with you. -2 Geniality.
"142":
  name: Host Speaks at Length
  full: |
    The host rises and drones on about the current political environment.

    ENERGETIC WINS: You listen carefully. Roll Intrigue.
      SUCCESS: You get a glimpse of what is to come. Gain +5 to your Intrigue for the rest of the feast.
    LAZY WINS: Who cares about politics, anyway? Gain Lazy trait.
"143":
  name: Host Needs Advice
  full: |
    The hostess desires to speak with you about some problems involving another lady.

    SUCCESS: The hostess nods at your advice. +1 Geniality.
    CRITICAL SUCCESS: The hostess is impressed with your perspicacity. +1 Geniality and gain Intrigue trait.
    FUMBLE: You manage to insult her. She glowers and stalks away. -5 Geniality.
"144":
  name: The Merchant of Venom
  full: |
    The court jester has singled you out for lampooning.

    MODEST WINS: You laugh along with everyone else. +1 Geniality.
    CRITICAL (MODEST): You trade some repartee with the jester and make others laugh. +2 Geniality.
    PROUD WINS: Your embarrassment is clear for all to see. -1 Geniality.
    CRITICAL (PROUD): You cuff the jester, knocking him to the floor as the hall descends into awkward silence. -3 Geniality.
"145":
  name: Those Bandits
  full: |
    A local knight mentions having trouble with bandits.

    SUCCESS: You discuss the problem at length and he is glad for your advice. Gain Hunting trait.
    CRITICAL SUCCESS: You give him some sound advice and he asks you to assist him with the matter in the days following the feast. +1 Geniality and Hunting trait.
"146":
  name: Time to Share
  full: |
    Suddenly your affairs seem inconsequential, and you want your friends to enjoy themselves.

    Keep this card. Whenever you draw a card during this feast, you may give it to another player.

    For every card given away, gain +1 Geniality.

    If you do not distribute any cards by the end of the feast, gain the Selfish trait.
"147":
  name: Tired
  full: |
    You feel exhausted and think about retiring.

    Keep this card. Each round, roll Energetic vs Lazy.
    ENERGETIC WINS: You muster up the endurance to stay for one more round.
    LAZY WINS: There will be other opportunities. You say your farewells and depart the feast.
"148":
  name: Wallflower
  full: |
    You notice a shy young lady sitting alone.

    SUCCESS: The lonely lady thanks you for your kind attention, but insists she would rather be alone. Gain Flirting trait.
    CRITICAL SUCCESS: The lady sees in you a kindred spirit and stays with you until you are called away (by drawing a Host card or being forced to depart). Keep this card. +1 Geniality per round.
    FUMBLE: You unwittingly insult your would-be companion. -3 Geniality.
"149":
  name: Wayward Wife
  full: |
    Another knight is looking for his wife—who just walked away after propositioning you.

    HONEST WINS: You point the knight towards his wife. Gain the knight's thanks. +2 Geniality.
    DECEITFUL WINS: You tell the knight nothing. You may choose to miss the next round of the feast. If you do, gain Lustful trait; roll for childbirth next Winter Phase.
"150":
  name: Well-Dressed
  full: |
    A lady passes and comments on your clothing.

    SUCCESS: She notes your choice of courtly garb. Gain Fashion trait.
    CRITICAL SUCCESS: She spends a while talking with you about your attire. Gain Fashion trait or choose Flirting trait instead.
    FUMBLE: Her unkind comments make others laugh. -2 Geniality.
"151":
  name: Who Are You?
  full: |
    An unknown lady asks you to entertain her during the feast.

    SUCCESS: You identify that she is an important lady in disguise. Roll Intrigue.
      SUCCESS: Gain 10 Glory for keeping her secret.
    FUMBLE: She is annoyed you blew her cover. -2 Geniality.
"152":
  name: Who Was That?
  full: |
    Another knight vies to identify another knight first.

    To determine the knight's Recognize if unknown, roll 1d6 + 5.

    YOU WIN: You identify the knight. Gain Recognize trait.
    CRITICAL SUCCESS: You tell of the mystery knight's deeds. +1 Geniality.
    HE WINS: You get it completely wrong. -2 Geniality.
"153":
  name: Wifely Woes
  full: |
    Your wife feels tired and says it is time to depart.

    MERCIFUL WINS: You say your farewells and depart the feast. Gain Love (Wife) trait.
    SELFISH WINS: You stay but your wife is unhappy. -1 Geniality.

    Married only; unmarried knights must discard and draw again.
"154":
  name: Young Braggarts
  full: |
    Several young knights are becoming progressively wilder trying to one-up each other.

    SUCCESS: You tell some juicy stories of your own and they give you another drink. +1 Geniality.
    FAILURE: The knights laugh at your ridiculous ideas and continue without you. -1 Geniality.
