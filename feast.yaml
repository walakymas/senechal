    JUST WINS: You intervene and both knights accept your judgment. +1 Geniality.
    ARBITRARY WINS: You side with one knight. The offended knight promises he won't forget the slight.
"120":
  name: Queasy
  full: |
    You may miss one round to go get some fresh air. If you do not, you must roll Constitution.

    FAILURE: You feel sick and depart the feast.
    FUMBLE: You throw up in the hall and are escorted out by the stewards, departing the feast.
"121":
  name: Queasy
  full: |
