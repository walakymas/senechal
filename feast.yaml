    JUST WINS: You intervene. Your cup and trencher now runneth over; gain +5 to Indulgent until the end of the feast. +2 Geniality.
    ARBITRARY WINS: You ignore the situation and turn away. Gain Indulgent trait.
"73":
  name: Introductions
  full: |
    A famous knight from outside the area asks if you would introduce him to some guests.

    SUCCESS: You introduce him to some guests. +1 Geniality.
    CRITICAL SUCCESS: You time it well and introduce him to the host. +2 Geniality.
    FUMBLE: You forget names you know well. -2 Geniality.
"74":
  name: Juicy Tales
  tags:
    - "keep"
    - "miss"
  full: |
