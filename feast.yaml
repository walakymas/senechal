    WORLDLY WINS: “I do what I want!” Gain Worldly trait.
"114":
  name: Passing Praise
  full: |
    The hostess of the feast passes by and comments on your looks.

    SUCCESS: She comments how you resemble a noted knight. +1 Geniality.
    CRITICAL SUCCESS: She notes aloud how handsome you look tonight. +2 Geniality.
    FUMBLE: Her words are cruel. You might remind her of someone she despises. -2 Geniality.
"115":
  name: Passion
  full: |
    During a conversation, a fellow guest says you lack passion.

    SUCCESS: You show them that you do in fact care deeply. Gain the Passion trait.
    FAILURE: Perhaps they're right. Reduce the Passion by 1 point. If you are speaking to a knight (roll 1d6: 1-3), you may instead challenge him to a duel. Gain Proud trait.
"116":
  name: People Skills
  full: |
