    SUCCESS: The ladies swoon over your ideas. +2 Geniality.
    CRITICAL SUCCESS: +2 Geniality and keep this card. If you draw a test card involving a lady, you may discard this card for a +5 bonus on the related test.
"123":
  name: Safekeeping
  full: |
    A knight asks you to keep a piece of jewelry safe for him.

    TRUSTING WINS: You do as he asks. Gain Honest trait.
    SUSPICIOUS WINS: You are not convinced of the knight's good intentions. Roll Courtesy.
    FAILURE: Your insinuation is insulting! -1 Geniality.
"124":
  name: Sage Advice
  full: |
    The host seeks your counsel about some problems with another knight or lord.

    SUCCESS: The host nods approvingly at your advice. +2 Geniality.
    CRITICAL SUCCESS: The host is fascinated by your insights. Gain an additional 10 Glory and the host's favor.
    FUMBLE: Nonsense. Are we talking about the same man? -4 Geniality.
"125":
  name: Secret Dish
  full: |
    A platter of your favorite food is served nearby.

    TEMPERATE SUCCESS: You ask for the platter to be brought over. All player-knights seated in the same area as you gain +1 Geniality, plus +1 Loyalty (Your player-knights' Order), if one exists.
    INDULGENT SUCCESS: You stuff your face. Miss the next round.
"126":
  name: Show of Strength
  full: |
    Another knight challenges you to a contest of strength.

    To determine the knight's STR if unknown, roll 3d6 + 3. On a tie, reroll until someone wins.

    YOU WIN: You are victorious. Gain 10 Glory.
    CRITICAL SUCCESS: You trounce the knight and impress the entire court. Gain 20 Glory, +1 Geniality, and +5 to any one roll at this feast.
    HE GETS A CRITICAL SUCCESS: You take 1d3 damage.
"127":
  name: Singing Sensation
  full: |
